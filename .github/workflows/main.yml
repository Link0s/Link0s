name: Generate Datas
on:
  schedule: # Ejecutar cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # Generar la serpiente
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Link0s
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Subir la animación generada a una rama "output"
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

5. Dale a **"Commit changes..."** para guardar el archivo.
6. Ve nuevamente a la pestaña "Actions", selecciona "Generate Datas" a la izquierda y dale al botón **"Run workflow"**.

¡En 1 minuto, GitHub generará tu animación y aparecerá mágicamente en tu perfil!
